{% extends "base.html" %}

{% block content %}

<style>
    .register-container {
        max-width: 500px;
        margin: 60px auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    .register-title {
        text-align: center;
        margin-bottom: 30px;
        font-size: 30px;
        color: #2c3e50;
    }

    form p {
        margin-bottom: 18px;
    }

    form input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #dcdde1;
        font-size: 14px;
        transition: 0.3s ease;
        outline: none;
    }

    form input:focus {
        border-color: #4e73df;
        box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.15);
    }

    .signup-btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #4e73df;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .signup-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .login-link {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .login-link a {
        color: #4e73df;
        text-decoration: none;
        font-weight: 500;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="register-container">
    <h2 class="register-title">Create Account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </div>
</div>

{% endblock %}
