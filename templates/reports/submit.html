{% extends "base.html" %}

{% block content %}

<style>
    .form-container {
        max-width: 600px;
        margin: 50px auto;
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .form-title {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        color: #2c3e50;
    }

    form p {
        margin-bottom: 18px;
    }

    form input,
    form textarea,
    form select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #dcdde1;
        font-size: 14px;
        transition: 0.3s ease;
        outline: none;
    }

    form input:focus,
    form textarea:focus,
    form select:focus {
        border-color: #4e73df;
        box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.15);
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background:  #4e73df;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }
</style>

<div class="form-container">
    <h2 class="form-title">Submit Report</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Submit Report</button>
    </form>
</div>

{% endblock %}
